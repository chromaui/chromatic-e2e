# Single release workflow for npm Trusted Publisher (OIDC).
# npm allows only one workflow filename per package; this file is triggered
# by workflow_run so npm attributes the run to release.yml.
#
# IMPORTANT: workflow_run triggers are only evaluated from the default branch (main).
# This file must be merged to main before Release will run; it will not run from a PR.
#
# - On main (after "Test and Release Main"): changeset version PR or publish (stable).
# - On PRs (after "Test and Release PR"): snapshot version + publish with tag canary.
#
# Re-running the test workflow triggers this again. Concurrency ensures we don't run
# two release jobs for the same commit at once (later trigger cancels in-progress).
# Stable: republish is safe (npm rejects existing versions). Canary: may publish again.
concurrency:
  group: release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

name: Release

on:
  workflow_run:
    workflows: ['Test and Release Main', 'Test and Release PR']
    types: [completed]

permissions:
  id-token: write # Required for npm Trusted Publisher (OIDC)
  contents: write # Others are required by changesets/action@v1
  pull-requests: write
  issues: read

jobs:
  release-stable:
    name: Release (stable)
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.name == 'Test and Release Main' && github.repository == 'chromaui/chromatic-e2e'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
      - name: Install Dependencies
        run: yarn install

      - name: Update npm
        run: |
          npm --version
          npm install -g npm@~11.10.0 # Work-around for https://github.com/npm/cli/issues/9151#issuecomment-4131466208
          npm install -g npm@latest
          npm --version

      - name: Stable release (main)
        uses: changesets/action@v1
        with:
          publish: yarn run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-canary:
    name: Release (canary)
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.name == 'Test and Release PR'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: yarn install

      - name: Build (canary)
        run: yarn run build

      - name: Set canary snapshot hash
        run: |
          echo "GIT_HASH=$(git rev-parse --short ${{ github.event.workflow_run.head_sha }})" >> "$GITHUB_ENV"

      - name: Update npm
        run: |
          npm --version
          npm install -g npm@latest
          npm --version

      - name: Publish canary
        run: |
          yarn run changeset version --snapshot $GIT_HASH
          yarn run changeset publish --no-git-tag --tag canary
