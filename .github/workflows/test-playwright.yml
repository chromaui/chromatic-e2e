# Runs Playwright E2E test and Chromatic publish
name: Test Playwright

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to check out. Defaults to the triggering ref.
        required: false
        type: string
        default: ''
    secrets:
      chromaticProjectToken:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Install Dependencies
        run: yarn install

      - name: Install Playwright
        run: |
          yarn playwright install

      - name: Build
        run: |
          yarn run build

      - name: Run tests
        run: |
          yarn run test:playwright

      - name: Publish to Chromatic
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.chromaticProjectToken }}
          buildScriptName: build-archive-storybook:playwright
