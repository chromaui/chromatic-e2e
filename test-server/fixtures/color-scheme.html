<!doctype html>
<html>
  <head>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        font-family: sans-serif;
        padding: 20px;
        background: white;
        color: black;
      }

      .badge {
        display: block;
        padding: 20px;
        margin: 10px 0;
        font-size: 24px;
        font-weight: bold;
        border: 4px solid;
      }

      /* Visible in both, but restyled per scheme */
      #always {
        background: #eee;
        color: #111;
        border-color: #999;
      }

      /* Hidden by default (dark), revealed in light */
      #light-only {
        display: none;
        background: #fffae6;
        color: #5a4b00;
        border-color: #e0c200;
      }

      /* Hidden by default (light), revealed in dark */
      #dark-only {
        display: none;
        background: #1b1b2f;
        color: #9ad0ff;
        border-color: #3a6ea5;
      }

      @media (prefers-color-scheme: light) {
        #light-only {
          display: block;
        }
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #111;
          color: #eee;
        }

        #always {
          background: #222;
          color: #eee;
          border-color: #555;
        }

        #dark-only {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div id="always" class="badge">Always visible (restyled per scheme)</div>
    <div id="light-only" class="badge">Only visible in LIGHT mode</div>
    <div id="dark-only" class="badge">Only visible in DARK mode</div>
  </body>
</html>
