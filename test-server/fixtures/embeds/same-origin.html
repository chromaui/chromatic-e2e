<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 1rem;
      }

      iframe {
        border: 1px solid #ccc;
        width: 100%;
        max-width: 45rem;
        height: 25rem;
      }
    </style>
  </head>
  <body>
    <h1>Embeds</h1>
    <p>Parent page with embedded content for E2E tests (same-origin iframe).</p>
    <iframe src="/embeds/embedded-page" title="Same-origin iframe"></iframe>
    <script>
      function setColor() {
        const params = new URLSearchParams(window.location.search);
        const color = params.get('color');

        if (color) {
          document.body.style.backgroundColor = color;
        }
      }

      setColor();
    </script>
  </body>
</html>
