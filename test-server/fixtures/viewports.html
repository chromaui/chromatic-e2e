<!doctype html>
<html>
  <head>
    <title>Viewports</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      #large,
      #medium,
      #small {
        display: none;
      }

      @media (min-width: 1000px) and (max-width: 1100px) {
        #large {
          display: block;
        }
      }

      @media (min-width: 800px) and (max-width: 900px) {
        #medium {
          display: block;
        }
      }

      @media (max-width: 500px) {
        #small {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <p id="large">I'm rendered when the page width is between 1100-1000</p>
    <p id="medium">I'm rendered when the page width is between 900-800</p>
    <p id="small">I'm rendered when the page width is between 500-0</p>
    <p>I'm always rendered</p>
    <p>Window width: <span id="width"></span></p>
    <p>Window height: <span id="height"></span></p>
  </body>

  <script lang="javascript">
    function updateSize() {
      document.getElementById('height').textContent = window.innerHeight;
      document.getElementById('width').textContent = window.innerWidth;
    }

    updateSize();
    window.addEventListener('resize', updateSize);
  </script>
</html>
